<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Orbital · Component</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Source+Code+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="orbital-header">
            <h1 class="orbital-title">AWS <span>Orbit</span></h1>
            <p class="orbital-subtitle">Cloud infrastructure at your fingertips</p>
        </div>

        <!-- AWS Orbital Component -->
        <div class="orbital-wrapper" id="orbitalWrapper">
            <!-- Dashed orbit rings -->
            <div class="orbit-ring orbit-ring-1"></div>
            <div class="orbit-ring orbit-ring-2"></div>
            <div class="orbit-ring orbit-ring-3"></div>
            
            <!-- SVG connector lines -->
            <svg class="orbital-svg" id="orbitalSvg" xmlns="http://www.w3.org/2000/svg"></svg>
            
            <!-- AWS center core -->
            <div class="orbit-core" id="awsCore">
                <span class="core-label">AWS</span>
                <span class="core-sub">cloud</span>
            </div>
            
            <!-- Interactive nodes -->
            <div class="orbit-node" style="top: 15%; left: 20%;" data-tool="EC2"><span>EC2</span></div>
            <div class="orbit-node" style="top: 70%; left: 15%;" data-tool="S3"><span>S3</span></div>
            <div class="orbit-node" style="top: 80%; left: 70%;" data-tool="Lambda"><span>λ</span></div>
            <div class="orbit-node" style="top: 25%; left: 75%;" data-tool="RDS"><span>RDS</span></div>
            <div class="orbit-node" style="top: 45%; left: 85%;" data-tool="VPC"><span>VPC</span></div>
            <div class="orbit-node" style="top: 60%; left: 40%;" data-tool="Docker"><span>Docker</span></div>
            <div class="orbit-node" style="top: 35%; left: 10%;" data-tool="K8s"><span>K8s</span></div>
            <div class="orbit-node" style="top: 85%; left: 50%;" data-tool="Terraform"><span>TF</span></div>
        </div>

        <div class="orbital-footer">
            <p><i class="fas fa-check-circle" style="color: #6ef0b0;"></i> Click on AWS core or any service node to interact</p>
        </div>
    </div>

    <!-- Script for connectors and interactions -->
    <script src="script.js"></script>
</body>
</html>
